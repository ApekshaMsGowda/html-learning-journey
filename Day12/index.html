<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal logo</title>
</head>
<body>
    <svg width="300" height="200">
        <rect width="300" height="200" fill="lightblue" stroke="black" ></rect>
        <circle cx="150" cy="100" r="60" fill="orange" stroke="black"></circle>
        <text x="130" y="110" font-size="20" fill="white" stroke="black">AMS</text>
    </svg>
    <br><br>
    <svg width="200" height="200">
        <circle cx="100" cy="100" r="80" fill="yellow" stroke="black"></circle>
        <circle cx="70" cy="80" r="10" fill="black" stroke="black"></circle>
        <circle cx="130" cy="80" r="10" fill="black" stroke="black"></circle>
        <line x1="70" y1="130" x2="130" y2="130" stroke="black" stroke-width="4"></line>

    </svg>
    <br><br>
    <svg width="300" height="400">
        <polygon points="100,50 50,120 150,120" fill="brown" stroke="black"></polygon>
        <rect x="50" y="120" width="100" height="125" fill="green" stroke="black"></rect>
        <rect x="85" y="190" width="30" height="55" fill="brown" stroke="black"></rect>


    </svg>
</body>
</html>
